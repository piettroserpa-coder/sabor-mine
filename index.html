<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Shooter - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-ui">
        <div id="stats">
            <span>Pontos: <b id="score">0</b></span>
            <span>Fase: <b id="level">1</b></span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="overlay" class="hidden">
        <h1>FIM DE JOGO</h1>
        <p>Sua pontuação: <span id="final-score">0</span></p>
        <div id="ranking">
            <h3>Top 3 Ranking</h3>
            <ul id="rank-list"></ul>
        </div>
        <button onclick="restartGame()">Jogar Novamente</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
