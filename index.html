<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Alien Invasion - Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="box">
            <h1>ALIEN<span>INVASION</span></h1>
            <input type="text" id="username" placeholder="Seu Nickname" maxlength="10">
            <button onclick="startGame()">INICIAR DEFESA</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div id="hud">
            <span>PILOTO: <b id="display-name"></b></span>
            <span>PONTOS: <b id="score">0</b></span>
            <span>FASE: <b id="level">1</b></span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="overlay" class="hidden">
        <div class="box">
            <h2 style="color: #ff0055;">MISSÃO FALHOU!</h2>
            <p>Pontos: <span id="final-score">0</span></p>
            <div id="ranking-container">
                <h3>TOP 5 RANKING</h3>
                <ul id="rank-list"></ul>
            </div>
            <button onclick="restartGame()">RECOMEÇAR</button>
            <button onclick="location.reload()" style="background:#444;">SAIR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
